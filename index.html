<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Sides</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #0f0f12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #e0e0e0;
      padding: 40px;
    }
    h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; color: #fff; }
    p { font-size: 0.95rem; color: #777; margin-bottom: 40px; }
    .links { display: flex; gap: 20px; }
    a {
      display: block;
      padding: 20px 32px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      text-decoration: none;
      color: #ccc;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    a:hover { background: rgba(255,255,255,0.08); color: #fff; transform: translateY(-2px); }
    a span { display: block; font-size: 0.75rem; color: #666; margin-top: 4px; font-weight: 400; }
  </style>
</head>
<body>
  <h1>Two Sides</h1>
  <p>Two versions of the same concept — pick one to view.</p>
  <div class="links">
    <a href="sequential.html">Sequential<span>Click-through slides</span></a>
    <a href="scrollable.html">Scrollable<span>One long page with transitions</span></a>
  </div>
</body>
</html>
