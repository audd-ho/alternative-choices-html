<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Sides</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Fredoka', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff5e6 0%, #ffe8d6 50%, #ffd4c4 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 10px; color: #3d2020; }
    p { font-size: 1rem; color: rgba(80,40,40,0.55); margin-bottom: 40px; text-align: center; max-width: 420px; line-height: 1.5; }
    .links { display: flex; gap: 20px; }
    a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 200px;
      padding: 28px 24px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 18px;
      text-decoration: none;
      color: #3d2020;
      font-weight: 700;
      font-size: 1.05rem;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
      text-align: center;
    }
    a:hover { background: #fff; transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    a span { display: block; font-size: 0.78rem; color: rgba(80,40,40,0.45); margin-top: 6px; font-weight: 500; }
  </style>
</head>
<body>
  <h1>Two Sides, One Story</h1>
  <p>Understanding starts with seeing both perspectives. Pick a format and explore how two people find their way forward together.</p>
  <div class="links">
    <a href="slides.html">Slides<span>Click through each part</span></a>
    <a href="scrollable.html">Scrollable<span>Flow through at your pace</span></a>
  </div>
</body>
</html>
