<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Sides</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Fredoka', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff5e6 0%, #ffe8d6 50%, #ffd4c4 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 10px; color: #3d2020; }
    p { font-size: 1rem; color: rgba(80,40,40,0.55); margin-bottom: 40px; text-align: center; max-width: 420px; line-height: 1.5; }
    .links { display: flex; gap: 20px; }
    a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 200px;
      padding: 28px 24px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 18px;
      text-decoration: none;
      color: #3d2020;
      font-weight: 700;
      font-size: 1.05rem;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
      text-align: center;
    }
    a:hover { background: #fff; transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    a span { display: block; font-size: 0.78rem; color: rgba(80,40,40,0.45); margin-top: 6px; font-weight: 500; }

    /* Upload fallback */
    .upload-area {
      display: none;
      cursor: pointer;
      padding: 24px 40px;
      border: 2px dashed rgba(80,50,50,0.2);
      border-radius: 16px;
      color: rgba(80,50,50,0.5);
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 32px;
      transition: border-color 0.2s ease;
    }
    .upload-area:hover { border-color: rgba(80,50,50,0.4); }
    .upload-area strong { color: rgba(80,50,50,0.7); }

    /* Reset button - subtle corner */
    .reset-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(80,50,50,0.1);
      background: rgba(255,255,255,0.5);
      color: rgba(80,50,50,0.35);
      cursor: pointer;
      transition: all 0.2s ease;
      display: none;
    }
    .reset-btn:hover { background: rgba(255,255,255,0.8); color: rgba(80,50,50,0.6); border-color: rgba(80,50,50,0.2); }

    /* Scattered images */
    .scatter-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .scatter-img {
      position: absolute;
      border-radius: 10px;
      object-fit: cover;
      opacity: 0.6;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    }

    /* Keep centre content above */
    h1, p, .upload-area, .links, .reset-btn {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="scatter-container" id="scatterContainer"></div>

  <h1 id="title">Two Sides, One Story</h1>
  <p id="desc">Understanding starts with seeing both perspectives. Pick a format and explore how two people find their way forward together.</p>

  <div class="upload-area" id="uploadArea">
    Could not auto-load content.json<br><strong>Click here or drag & drop</strong> your content.json file
    <input type="file" accept=".json" id="fileInput" style="display:none;">
  </div>

  <div class="links" id="links" style="display:none;">
    <a href="slides.html">Slides<span>Click through each part</span></a>
    <a href="scrollable.html">Scrollable<span>Flow through at your pace</span></a>
  </div>

  <button class="reset-btn" id="resetBtn" onclick="resetContent()">Reset JSON</button>

  <script>
    const titleEl = document.getElementById('title');
    const descEl = document.getElementById('desc');
    const linksEl = document.getElementById('links');
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');

    function onContentLoaded(data) {
      // Store in sessionStorage so slides/scrollable can grab it
      sessionStorage.setItem('content', JSON.stringify(data));

      // Update index page text from JSON
      if (data.title) titleEl.innerHTML = data.title;
      if (data.description) descEl.innerHTML = data.description;

      // Show links, hide upload, show reset
      linksEl.style.display = 'flex';
      uploadArea.style.display = 'none';
      document.getElementById('resetBtn').style.display = 'block';
    }

    function resetContent() {
      sessionStorage.removeItem('content');
      linksEl.style.display = 'none';
      uploadArea.style.display = 'block';
      document.getElementById('resetBtn').style.display = 'none';
      titleEl.textContent = 'Two Sides, One Story';
      descEl.textContent = 'Upload a content.json to get started.';
    }

    // Auto-load via fetch
    (async function() {
      try {
        const res = await fetch('content.json');
        if (!res.ok) throw new Error('fetch failed');
        const data = await res.json();
        onContentLoaded(data);
      } catch(e) {
        // Show upload fallback
        uploadArea.style.display = 'block';
        linksEl.style.display = 'none';
      }
    })();

    // Manual upload handlers
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = 'rgba(80,50,50,0.5)'; });
    uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = 'rgba(80,50,50,0.2)'; });
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.style.borderColor = 'rgba(80,50,50,0.2)';
      const file = e.dataTransfer.files[0];
      if (file) readFile(file);
    });
    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) readFile(file);
    });

    function readFile(file) {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          onContentLoaded(data);
        } catch(err) { alert('Invalid JSON file'); }
      };
      reader.readAsText(file);
    }

    // === SCATTER IMAGES AROUND THE EDGES (ring/circle pattern) ===
    (function scatterImages() {
      const container = document.getElementById('scatterContainer');
      const files = [
        '0d8e1ea003ec3d6766a87fb63b893befe704c8beca45a24c2c8008b5c29a021b.webp',
        '1775570508742chinese actor zhang linghe from pursuitof jade.avif',
        '5deb818c7b678f45734b8e325115409e.jpg',
        '74539cba7db8cc13e73813d22d90caa7.jpg',
        '76f5ca64-1576-4a54-8450-55976e80a57a.jpg',
        'B6FtNKtgSqRqbnNsbSFsFFh2P8F4Qvjl5avopBgNsFYbhaFrRoRDLb6gvl8Fl1rORAJap.jpg',
        'f2b0fcde07.jpg',
        'FE40z_rXoAAO2Vl.jpg',
        'images_zlh.jpg',
        'images_zlh2.jpg',
        'images_zlh3.jpg',
        'images_zlh4.jpg',
        'images_zlh5.jpg',
        'images.jpg',
        'l0K1mJ_2f.png',
        'SnapInsta.to_503110171_17928777672057457_3553153852473854475_n-1.webp',
        'what-are-your-thoughts-on-zhang-linghe-as-an-actor-v0-61fif9oin52f1.webp',
        'YY1bQP_5c.jpg',
        'zhang-linghe-bagikan-pemotretan-sebagai-45b988.webp',
        'Zhang-Linghe-Tanggapi-Kekhawatiran-Soal-Tubuh-Kurus-Saat-Syuting-Variety-Show.webp'
      ];

      const count = files.length;
      const cx = 50; // center x %
      const cy = 50; // center y %

      // Shuffle files randomly
      const shuffled = files.sort(() => Math.random() - 0.5);

      shuffled.forEach((file, i) => {
        const img = document.createElement('img');
        img.className = 'scatter-img';
        img.src = `zlh/${file}`;
        img.loading = 'lazy';

        const size = 70 + Math.random() * 60; // 70-130px
        img.style.width = size + 'px';
        img.style.height = size + 'px';

        // Place in a ring around centre — radius keeps them away from middle
        const angle = (i / count) * Math.PI * 2 + (Math.random() * 0.4 - 0.2);
        const radius = 32 + Math.random() * 12; // 32-44% from center

        const x = cx + Math.cos(angle) * radius;
        const y = cy + Math.sin(angle) * radius;

        img.style.left = `calc(${x}% - ${size/2}px)`;
        img.style.top = `calc(${y}% - ${size/2}px)`;
        img.style.transform = `rotate(${Math.random() * 20 - 10}deg)`;

        container.appendChild(img);
      });
    })();
  </script>
</body>
</html>
