<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Sides — Scrollable</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Fredoka', sans-serif;
      background: #fffaf5;
      color: #3d2d2d;
      overflow-x: hidden;
      position: relative;
    }

    /* === INTRO === */
    .intro {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      background: linear-gradient(180deg, #fff5e6 0%, #ffe8d6 30%, #ffd4c4 60%, #ffe8d6 85%, #fffaf5 100%);
      position: relative;
    }

    .intro h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #3d2020;
      margin-bottom: 12px;
    }

    .intro > p {
      font-size: 1.05rem;
      color: rgba(80,40,40,0.6);
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 48px;
    }

    .intro-faces {
      display: flex;
      align-items: center;
      gap: 40px;
      margin-bottom: 48px;
    }

    .intro-face {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,0.7);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .intro-face .if-name { font-size: 1.1rem; font-weight: 700; }
    .intro-face:first-child .if-name { color: #e07030; }
    .intro-face:last-child .if-name { color: #20a090; }
    .intro-face .if-sub { font-size: 0.78rem; color: rgba(80,40,40,0.45); }

    .vs-badge {
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(80,40,40,0.25);
      letter-spacing: 2px;
    }

    .scroll-cue {
      font-size: 0.8rem;
      color: rgba(80,40,40,0.35);
      animation: drift 2.5s ease-in-out infinite;
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0); opacity: 0.6; }
      50% { transform: translateY(8px); opacity: 1; }
    }

    /* === PHASE BANNERS === */
    .phase-banner {
      padding: 100px 40px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .phase-banner .pb-num {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(80,40,40,0.3);
      margin-bottom: 10px;
    }

    .phase-banner h2 {
      font-size: 2rem;
      font-weight: 700;
      color: #3d2020;
      margin-bottom: 10px;
    }

    .phase-banner p {
      font-size: 0.92rem;
      color: rgba(80,40,40,0.5);
      max-width: 460px;
      margin: 0 auto;
      line-height: 1.55;
    }

    /* Gradients that fade into the page background at top and bottom — no hard edges */
    .pb-before { background: linear-gradient(180deg, transparent 0%, rgba(255,220,200,0.4) 30%, rgba(255,210,190,0.5) 50%, rgba(255,220,200,0.4) 70%, transparent 100%); }
    .pb-present { background: linear-gradient(180deg, transparent 0%, rgba(200,230,255,0.4) 30%, rgba(190,220,255,0.5) 50%, rgba(200,230,255,0.4) 70%, transparent 100%); }
    .pb-decide { background: linear-gradient(180deg, transparent 0%, rgba(230,215,255,0.4) 30%, rgba(220,200,255,0.5) 50%, rgba(230,215,255,0.4) 70%, transparent 100%); }

    /* === SCROLL NARRATIVE (unique to scrollable) === */
    /* Instead of a table, use a flowing conversation-like layout */
    .narrative {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      position: relative;
    }

    /* Center thread line */
    .narrative::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background: linear-gradient(180deg, rgba(255,200,150,0.1), rgba(255,180,130,0.15), rgba(255,200,150,0.1));
      transform: translateX(-50%);
      border-radius: 1px;
    }

    /* Topic marker (centered) */
    .topic-marker {
      position: relative;
      text-align: center;
      margin: 48px 0 24px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease;
    }

    .topic-marker.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .topic-marker .tm-inner {
      display: inline-block;
      background: rgba(255,255,255,0.7);
      border: 1.5px solid rgba(80,40,40,0.06);
      border-radius: 30px;
      padding: 8px 20px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(80,40,40,0.5);
      position: relative;
      z-index: 5;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }

    .tm-inner .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-left: 8px;
      vertical-align: middle;
    }

    .status-dot.conflict { background: #ffb347; }
    .status-dot.aligned { background: #7bed9f; }
    .status-dot.partial { background: #74b9ff; }

    /* Speech pair: A on left, B on right */
    .speech-pair {
      display: grid;
      grid-template-columns: 1fr 60px 1fr;
      gap: 0;
      margin-bottom: 12px;
      opacity: 0;
      transition: all 0.6s ease;
    }

    .speech-pair.visible { opacity: 1; }

    .speech-pair.visible .speech-a {
      transform: translateX(0);
    }

    .speech-pair.visible .speech-b {
      transform: translateX(0);
    }

    .speech-a, .speech-b {
      padding: 20px 22px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.65;
      color: #4a3a3a;
      position: relative;
      transition: transform 0.6s ease;
    }

    .speech-a {
      background: rgba(255,220,200,0.45);
      border: 1px solid rgba(255,180,150,0.25);
      border-radius: 18px 18px 4px 18px;
      text-align: right;
      transform: translateX(-20px);
    }

    .speech-b {
      background: rgba(200,240,235,0.45);
      border: 1px solid rgba(150,220,210,0.25);
      border-radius: 18px 18px 18px 4px;
      text-align: left;
      transform: translateX(20px);
    }

    /* Mini avatar in speech */
    .speech-a .mini-avatar,
    .speech-b .mini-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      overflow: hidden;
      position: absolute;
      bottom: -14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .speech-a .mini-avatar { right: 12px; }
    .speech-b .mini-avatar { left: 12px; }

    .mini-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* Center gap between speeches */
    .speech-gap {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Before section: speeches push apart */
    .narrative-before .speech-pair.visible .speech-a { transform: translateX(-6px); }
    .narrative-before .speech-pair.visible .speech-b { transform: translateX(6px); }

    /* Present section: speeches come together */
    .narrative-present .speech-pair.visible .speech-a { transform: translateX(4px); }
    .narrative-present .speech-pair.visible .speech-b { transform: translateX(-4px); }

    /* === DECISION SECTION === */
    .decision-area {
      padding: 60px 24px 100px;
      background: transparent;
      text-align: center;
      position: relative;
    }

    .decision-area h2 {
      font-size: 1.7rem;
      font-weight: 700;
      color: #3d2020;
      margin-bottom: 6px;
    }

    .decision-area .da-sub {
      font-size: 0.9rem;
      color: rgba(80,40,40,0.45);
      margin-bottom: 56px;
    }

    /* The road/path that splits */
    .road-container {
      max-width: 700px;
      margin: 0 auto;
      position: relative;
    }

    .road-svg {
      display: block;
      width: 100%;
      height: 120px;
    }

    .path-cards {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      max-width: 700px;
      margin: 0 auto;
    }

    .path-card {
      background: #fff;
      border: 2px solid rgba(0,0,0,0.04);
      border-radius: 20px;
      padding: 28px 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
      position: relative;
      overflow: hidden;
    }

    .path-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .path-card:nth-child(1)::before { background: linear-gradient(90deg, #ffb347, #ffd180); }
    .path-card:nth-child(2)::before { background: linear-gradient(90deg, #74b9ff, #a8d8ff); }
    .path-card:nth-child(3)::before { background: linear-gradient(90deg, #7fdbca, #a8e6cf); }

    .path-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.08);
      border-color: transparent;
    }

    .path-card:hover::before { opacity: 1; }

    .path-card:nth-child(1):hover { border-color: rgba(255,179,71,0.35); }
    .path-card:nth-child(2):hover { border-color: rgba(116,185,255,0.35); }
    .path-card:nth-child(3):hover { border-color: rgba(127,219,202,0.35); }

    .path-card.selected {
      border-color: rgba(255,179,71,0.5) !important;
      box-shadow: 0 8px 28px rgba(0,0,0,0.06);
      transform: translateY(-6px) scale(1.02);
    }

    .path-card.selected::before { opacity: 1; }

    .path-card .pc-icon { margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .path-card .pc-icon img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
    .path-card h3 { font-size: 0.95rem; font-weight: 700; color: #3d2020; margin-bottom: 6px; }
    .path-card p { font-size: 0.78rem; color: rgba(80,40,40,0.5); line-height: 1.4; }

    /* === OUTCOME === */
    .outcome-area {
      display: none;
      padding: 60px 24px 80px;
      background: #fffaf5;
      max-width: 1000px;
      margin: 0 auto;
    }

    .outcome-area.visible {
      display: block;
      animation: riseIn 0.6s ease;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .outcome-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .outcome-title h3 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #3d2020;
      margin-bottom: 4px;
    }

    .outcome-title .ot-sub {
      font-size: 0.8rem;
      color: rgba(80,40,40,0.4);
    }

    /* Outcome uses split columns with avatars */
    .outcome-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .outcome-col {
      position: relative;
    }

    .outcome-col-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .outcome-col-header .oc-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }

    .outcome-col-header .oc-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .outcome-col-header .oc-info .oc-name {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .outcome-col.col-a .oc-name { color: #e07030; }
    .outcome-col.col-b .oc-name { color: #20a090; }

    .outcome-col-header .oc-info .oc-tag {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 4px;
      margin-top: 2px;
    }

    .oc-tag.positive { background: rgba(127,219,180,0.15); color: #20a060; }
    .oc-tag.neutral { background: rgba(255,200,130,0.15); color: #d08030; }

    .outcome-point {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.04);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }

    .outcome-point .op-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(80,40,40,0.35);
      margin-bottom: 8px;
    }

    .outcome-point .op-value {
      font-size: 0.88rem;
      line-height: 1.6;
      color: #4a3a3a;
    }

    .outcome-col.col-a .outcome-point { border-left: 3px solid rgba(255,179,71,0.35); }
    .outcome-col.col-b .outcome-point { border-left: 3px solid rgba(127,219,202,0.35); }

    /* Reset */
    .reset-bar {
      text-align: center;
      padding: 32px 0 80px;
    }

    .reset-btn {
      font-family: 'Fredoka', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 50px;
      border: 2px solid rgba(80,40,40,0.1);
      background: rgba(255,255,255,0.8);
      color: rgba(80,40,40,0.55);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .reset-btn:hover { background: #fff; color: #3d2020; border-color: rgba(80,40,40,0.2); }

    /* Mobile */
    @media (max-width: 768px) {
      .speech-pair { grid-template-columns: 1fr; gap: 12px; }
      .speech-gap { display: none; }
      .speech-a { text-align: left; border-radius: 18px; transform: none !important; }
      .speech-b { border-radius: 18px; transform: none !important; }
      .narrative::before { display: none; }
      .path-cards { grid-template-columns: 1fr; max-width: 320px; }
      .road-svg { display: none; }
      .outcome-split { grid-template-columns: 1fr; }
      .intro h1 { font-size: 2rem; }
      .intro-faces { gap: 24px; }
    }

    /* === BACKGROUND STICKERS === */
    .bg-stickers {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-sticker {
      position: absolute;
      opacity: 0.6;
      border-radius: 10px;
      object-fit: cover;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    /* Make sure content stays above stickers */
    .intro, .phase-banner, .narrative, .decision-area, .outcome-area, .reset-bar {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div class="bg-stickers" id="bgStickers"></div>
  <div id="app">
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px;">
      <p style="color:rgba(80,50,50,0.5); font-size:0.9rem;">Loading...</p>
    </div>
  </div>

  <script>
    // === AUTO-LOAD ===
    (async function autoLoad() {
      let data;
      const cached = sessionStorage.getItem('content');
      if (cached) {
        try { data = JSON.parse(cached); } catch(e) {}
      }
      if (!data) {
        try {
          const res = await fetch('content.json');
          if (!res.ok) throw new Error();
          data = await res.json();
        } catch(e) {
          document.getElementById('app').innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px;"><p style="color:rgba(80,50,50,0.5);">Could not load content.json. Please open from index.html first.</p></div>';
          return;
        }
      }
      initData(data);
    })();

    function initData(data) {
      const pA = data.person_a;
      const pB = data.person_b;

      let html = '';

      // INTRO
      html += `
        <div class="intro">
          <h1>${data.title}</h1>
          <p>${data.description}</p>
          <div class="intro-faces">
            <div class="intro-face">
              <div class="avatar"><img src="${pA.avatar}" alt="${pA.name}"></div>
              <div class="if-name">${pA.name}</div>
              <div class="if-sub">${pA.tagline}</div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="intro-face">
              <div class="avatar"><img src="${pB.avatar}" alt="${pB.name}"></div>
              <div class="if-name">${pB.name}</div>
              <div class="if-sub">${pB.tagline}</div>
            </div>
          </div>
          <div class="scroll-cue">&darr; scroll to begin &darr;</div>
        </div>
      `;

      // PHASES
      data.phases.forEach((phase, idx) => {
        const bannerClass = idx === 0 ? 'pb-before' : idx === 1 ? 'pb-present' : 'pb-decide';
        html += `
          <div class="phase-banner ${bannerClass}">
            <div class="pb-num">Phase ${idx + 1}</div>
            <h2>${phase.title}</h2>
            <p>${phase.description || ''}</p>
          </div>
        `;

        const narrativeClass = idx === 0 ? 'narrative-before' : 'narrative-present';
        html += `<div class="narrative ${narrativeClass}">`;

        Object.entries(phase.topics).forEach(([topic, val]) => {
          html += `
            <div class="topic-marker" data-reveal>
              <div class="tm-inner">${topic} <span class="status-dot ${val.status}"></span></div>
            </div>
            <div class="speech-pair" data-reveal>
              <div class="speech-a">
                ${val.A}
                <div class="mini-avatar"><img src="${pA.avatar}" alt="${pA.name}"></div>
              </div>
              <div class="speech-gap"></div>
              <div class="speech-b">
                ${val.B}
                <div class="mini-avatar"><img src="${pB.avatar}" alt="${pB.name}"></div>
              </div>
            </div>
          `;
        });

        html += `</div>`;
      });

      // Decision banner
      html += `
        <div class="phase-banner pb-decide">
          <div class="pb-num">Phase ${data.phases.length + 1}</div>
          <h2>The Decision</h2>
          <p>Someone's needs take priority — or they find a middle ground.</p>
        </div>
      `;

      // Decision area with road-container (original structure)
      html += `
        <div class="decision-area">
          <h2>Whose path is chosen?</h2>
          <p class="da-sub">Each leads to a different outcome for both of them.</p>
          <div class="road-container">
            <svg class="road-svg" viewBox="0 0 700 120" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M350 0 L350 35" stroke="rgba(80,40,40,0.12)" stroke-width="4" stroke-linecap="round"/>
              <circle cx="350" cy="35" r="6" fill="rgba(80,40,40,0.1)" stroke="rgba(80,40,40,0.15)" stroke-width="2"/>
              <path d="M350 35 C350 60, 117 70, 117 115" stroke="rgba(255,179,120,0.3)" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 4"/>
              <path d="M350 35 L350 115" stroke="rgba(116,185,255,0.3)" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 4"/>
              <path d="M350 35 C350 60, 583 70, 583 115" stroke="rgba(127,219,202,0.3)" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 4"/>
              <circle cx="117" cy="115" r="4" fill="rgba(255,179,120,0.4)"/>
              <circle cx="350" cy="115" r="4" fill="rgba(116,185,255,0.4)"/>
              <circle cx="583" cy="115" r="4" fill="rgba(127,219,202,0.4)"/>
            </svg>
            <div class="path-cards">
              <div class="path-card" onclick="selectOutcome('a', this)">
                <span class="pc-icon"><img src="${pA.avatar}" alt="${pA.name}"></span>
                <h3>${pA.name}'s Way</h3>
                <p>Their path takes priority.</p>
              </div>
              <div class="path-card" onclick="selectOutcome('compromise', this)">
                <span class="pc-icon"><img src="${pA.avatar}" alt="${pA.name}"><img src="${pB.avatar}" alt="${pB.name}"></span>
                <h3>Compromise</h3>
                <p>A middle ground for both.</p>
              </div>
              <div class="path-card" onclick="selectOutcome('b', this)">
                <span class="pc-icon"><img src="${pB.avatar}" alt="${pB.name}"></span>
                <h3>${pB.name}'s Way</h3>
                <p>Their path takes priority.</p>
              </div>
            </div>
          </div>
        </div>
      `;

      // Outcome area
      html += `
        <div class="outcome-area" id="outcomeArea">
          <div class="outcome-title" id="outcomeTitle"></div>
          <div class="outcome-split" id="outcomeSplit"></div>
          <div class="reset-bar">
            <button class="reset-btn" onclick="resetChoice()">← Choose a different path</button>
          </div>
        </div>
      `;

      document.getElementById('app').innerHTML = html;

      // Scroll reveal
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
      }, { threshold: 0.15 });
      document.querySelectorAll('[data-reveal]').forEach(el => observer.observe(el));

      // Scatter stickers
      scatterStickers();

      // Store for outcome handler
      window._outcomes = data.outcomes;
      window._pA = pA;
      window._pB = pB;
    }

    // === OUTCOME HANDLER ===
    function selectOutcome(choice, el) {
      document.querySelectorAll('.path-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');

      const outcome = window._outcomes[choice];
      const pA = window._pA;
      const pB = window._pB;
      const area = document.getElementById('outcomeArea');

      document.getElementById('outcomeTitle').innerHTML = `
        <h3>${outcome.title}</h3>
        <p class="ot-sub">How each person experiences this outcome</p>
      `;

      const buildPoints = (points) => Object.entries(points).map(([label, value]) => `
        <div class="outcome-point">
          <div class="op-label">${label}</div>
          <div class="op-value">${value}</div>
        </div>
      `).join('');

      document.getElementById('outcomeSplit').innerHTML = `
        <div class="outcome-col col-a">
          <div class="outcome-col-header">
            <div class="oc-avatar"><img src="${pA.avatar}" alt="${pA.name}"></div>
            <div class="oc-info">
              <div class="oc-name">${pA.name}</div>
              <span class="oc-tag ${outcome.A.tag}">${outcome.A.tag_label}</span>
            </div>
          </div>
          ${buildPoints(outcome.A.points)}
        </div>
        <div class="outcome-col col-b">
          <div class="outcome-col-header">
            <div class="oc-avatar"><img src="${pB.avatar}" alt="${pB.name}"></div>
            <div class="oc-info">
              <div class="oc-name">${pB.name}</div>
              <span class="oc-tag ${outcome.B.tag}">${outcome.B.tag_label}</span>
            </div>
          </div>
          ${buildPoints(outcome.B.points)}
        </div>
      `;

      area.classList.add('visible');
      setTimeout(() => area.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
    }

    function resetChoice() {
      document.querySelectorAll('.path-card').forEach(c => c.classList.remove('selected'));
      document.getElementById('outcomeArea').classList.remove('visible');
      document.querySelector('.decision-area').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // === BACKGROUND STICKERS ===
    function scatterStickers() {
      const container = document.getElementById('bgStickers');
      const totalFiles = 120;
      const startNum = 450938;
      const count = 80;

      const pageHeight = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight, 5000);
      container.style.height = pageHeight + 'px';

      for (let i = 0; i < count; i++) {
        const num = startNum + Math.floor(Math.random() * totalFiles);
        const img = document.createElement('img');
        img.className = 'bg-sticker';
        img.src = `background_pics_stickers/file_${num}.webp`;
        img.loading = 'lazy';
        const size = 50 + Math.random() * 90;
        img.style.width = size + 'px';
        img.style.height = size + 'px';
        const yBase = (i / count) * pageHeight;
        const yJitter = (Math.random() - 0.5) * 200;
        img.style.top = (yBase + yJitter) + 'px';
        img.style.left = (Math.random() * 90 + 3) + '%';
        img.style.transform = `rotate(${Math.random() * 20 - 10}deg)`;
        container.appendChild(img);
      }
    }
  </script>
</body>
</html>
